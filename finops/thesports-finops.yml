description: 'FOCUS-aligned FinOps placeholder for TheSports: contact-sales sports data feeds with no
  published rate card.'
sources:
  - https://www.thesports.com/pricing
  - https://focus.finops.org/focus-specification/v1-3/
notes: TheSports publishes no public pricing or billing documentation; FinOps shape is inferred from
  the contact-sales posture and cannot be reconciled until a contract is in hand.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: TheSports
serviceCategory: Sports Data
billingModel:
  pricingCategory: Custom / Contact Sales
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: TheSports
  ServiceCategory: Sports Data
  ProviderName: TheSports
  PublisherName: TheSports
  BillingCurrency: USD
meters:
  - name: contracted_data_access
    unit: varies
    aggregation: sum
    dimensions:
      - sport
      - feed
principles:
  - name: Visibility
    description: Track invoiced contract spend and any per-feed usage reports TheSports provides under
      the negotiated agreement.
  - name: Allocation
    description: Allocate the contracted feed cost to the sports product/team consuming each feed (football,
      basketball, tennis, esports).
  - name: Optimization
    description: Renegotiate or rescope feeds at renewal based on actual sport-by-sport consumption;
      drop unused feeds.
  - name: Accountability
    description: Assign a single sports-data owner accountable for the TheSports contract, renewal date,
      and overage exposure.

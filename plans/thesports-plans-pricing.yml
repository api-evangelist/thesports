description: TheSports does not publish per-tier pricing on its public website. The provider promotes
  a "15-day free trial" and a "70% below market" claim, then routes all customers to a sales contact form
  for a customized quote. Plans below reflect that contact-sales-only commercial posture.
sources:
  - https://www.thesports.com/pricing
notes: Public pricing page surfaces only a free-trial CTA and a "Contact us" form; no per-tier numbers
  are published. Reconciliation requires a sales-issued quote.
plans:
  - id: thesports-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-quoted commercial access to TheSports football, basketball, tennis, and esports
      data feeds. A 15-day free trial is advertised but no published per-tier rate card exists.
    entries:
      - label: Custom Quote
        name: custom_quote
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: 15-Day Free Trial
      - name: Football / Soccer Data
      - name: Basketball Data
      - name: Tennis Data
      - name: Esports Data

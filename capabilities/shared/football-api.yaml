naftiko: "1.0.0-alpha1"

info:
  label: "TheSports Football API"
  description: >-
    Real-time football data feeds covering competitions, teams, players,
    matches, live scores, lineups, statistics, and standings worldwide.
  tags:
    - Sports
    - Football
    - Real-Time
    - Data
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      THESPORTS_API_KEY: THESPORTS_API_KEY

capability:
  consumes:
    - type: http
      namespace: thesports-football
      baseUri: https://api.thesports.com/v1
      description: "TheSports Football API providing real-time sports data."
      authentication:
        type: apikey
        key: user_key
        value: "{{THESPORTS_API_KEY}}"
        placement: query
      resources:
        - name: competitions
          path: /football/competition
          description: Football competitions and league data
          operations:
            - name: list-competitions
              method: GET
              description: List all football competitions
              inputParameters:
                - name: country_id
                  in: query
                  type: string
                  required: false
                  description: Filter by country ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-competition-details
              method: GET
              description: Get detailed information about a competition
              inputParameters:
                - name: competition_id
                  in: query
                  type: string
                  required: true
                  description: The competition ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: teams
          path: /football/team
          description: Football team data
          operations:
            - name: list-teams
              method: GET
              description: List football teams
              inputParameters:
                - name: competition_id
                  in: query
                  type: string
                  required: false
                  description: Filter by competition ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-team-details
              method: GET
              description: Get detailed information about a team
              inputParameters:
                - name: team_id
                  in: query
                  type: string
                  required: true
                  description: The team ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: players
          path: /football/player
          description: Football player data
          operations:
            - name: list-players
              method: GET
              description: List players optionally filtered by team
              inputParameters:
                - name: team_id
                  in: query
                  type: string
                  required: false
                  description: Filter by team ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-player-details
              method: GET
              description: Get detailed player information and statistics
              inputParameters:
                - name: player_id
                  in: query
                  type: string
                  required: true
                  description: The player ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: matches
          path: /football/match
          description: Football match fixtures and results
          operations:
            - name: list-matches
              method: GET
              description: List matches for a competition or date
              inputParameters:
                - name: competition_id
                  in: query
                  type: string
                  required: false
                  description: Filter by competition ID
                - name: date
                  in: query
                  type: string
                  required: false
                  description: Filter by date (YYYY-MM-DD)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-match-details
              method: GET
              description: Get detailed match information
              inputParameters:
                - name: match_id
                  in: query
                  type: string
                  required: true
                  description: The match ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-match-lineup
              method: GET
              description: Get match lineup and substitutes
              inputParameters:
                - name: match_id
                  in: query
                  type: string
                  required: true
                  description: The match ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-match-statistics
              method: GET
              description: Get detailed match statistics
              inputParameters:
                - name: match_id
                  in: query
                  type: string
                  required: true
                  description: The match ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: standings
          path: /football/standings
          description: League tables and competition standings
          operations:
            - name: get-standings
              method: GET
              description: Get league standings for a competition
              inputParameters:
                - name: competition_id
                  in: query
                  type: string
                  required: true
                  description: The competition ID
                - name: season_id
                  in: query
                  type: string
                  required: false
                  description: The season ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: thesports-football-api
      resources:
        - path: /v1/competitions
          name: competitions
          description: Football competitions list
          operations:
            - method: GET
              name: list-competitions
              description: List all football competitions
              call: "thesports-football.list-competitions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/competitions/{competition_id}
          name: competition-details
          description: Single competition details
          operations:
            - method: GET
              name: get-competition-details
              description: Get competition details
              call: "thesports-football.get-competition-details"
              with:
                competition_id: "rest.competition_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/teams
          name: teams
          description: Football teams
          operations:
            - method: GET
              name: list-teams
              description: List football teams
              call: "thesports-football.list-teams"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/matches
          name: matches
          description: Football matches
          operations:
            - method: GET
              name: list-matches
              description: List football matches
              call: "thesports-football.list-matches"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/standings
          name: standings
          description: League standings
          operations:
            - method: GET
              name: get-standings
              description: Get league standings
              call: "thesports-football.get-standings"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: thesports-football-mcp
      transport: http
      tools:
        - name: list-competitions
          description: List all football competitions
          hints:
            readOnly: true
            openWorld: true
          call: "thesports-football.list-competitions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-match-details
          description: Get detailed match information including score and events
          hints:
            readOnly: true
            openWorld: true
          call: "thesports-football.get-match-details"
          with:
            match_id: "tools.match_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-standings
          description: Get league standings for a competition
          hints:
            readOnly: true
            openWorld: true
          call: "thesports-football.get-standings"
          with:
            competition_id: "tools.competition_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-matches
          description: List matches for a competition or date
          hints:
            readOnly: true
            openWorld: true
          call: "thesports-football.list-matches"
          outputParameters:
            - type: object
              mapping: "$."

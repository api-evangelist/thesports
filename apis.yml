  - aid: thesports:basketball-api
    name: TheSports Basketball API
    description: >-
      Real-time basketball data feeds including NBA, EuroLeague, and other
      major leagues. Covers teams, players, matches, live scores, box scores,
      and season statistics.
    humanURL: https://www.thesports.com/
    baseURL: https://api.thesports.com/v1
    tags:
      - Basketball
      - NBA
      - Sports
      - Real-Time
    properties:
      - type: Documentation
        url: https://www.thesports.com/docs
  - aid: thesports:tennis-api
    name: TheSports Tennis API
    description: >-
      Tennis data feeds covering ATP, WTA, and Grand Slam tournaments.
      Includes player profiles, match results, live scores, rankings, and
      tournament brackets.
    humanURL: https://www.thesports.com/
    baseURL: https://api.thesports.com/v1
    tags:
      - Tennis
      - ATP
      - WTA
      - Sports
    properties:
      - type: Documentation
        url: https://www.thesports.com/docs
  - aid: thesports:esports-api
    name: TheSports Esports API
    description: >-
      Esports data feeds for CS:GO, League of Legends, and other major titles.
      Covers teams, players, tournaments, matches, live scores, and statistics.
    humanURL: https://www.thesports.com/
    baseURL: https://api.thesports.com/v1
    tags:

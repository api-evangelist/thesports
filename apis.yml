aid: thesports
name: TheSports
description: >-
  TheSports provides real-time sports data feeds, live trackers, and widgets
  covering football, basketball, tennis, esports, and other major sports
  worldwide. Their API delivers live scores, match statistics, player data,
  standings, and comprehensive sports analytics for media, broadcasters, OTT
  platforms, and developers.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Sports
  - Football
  - Basketball
  - Tennis
  - Esports
  - Data
  - Real-Time
created: '2025-03-01'
modified: '2026-05-03'
url: >-
  https://raw.githubusercontent.com/api-evangelist/thesports/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: thesports:football-api
    name: TheSports Football API
    description: >-
      Real-time football data feeds covering competitions, teams, players,
      matches, live scores, lineups, statistics, standings, and match analysis
      worldwide including major leagues and international tournaments.
    humanURL: https://www.thesports.com/
    baseURL: https://api.thesports.com/v1
    tags:
      - Football
      - Soccer
      - Sports
      - Real-Time
      - Data
